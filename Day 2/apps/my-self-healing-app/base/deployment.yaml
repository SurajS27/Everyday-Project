apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-self-healing-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-self-healing-app
  template:
    metadata:
      labels:
        app: my-self-healing-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80