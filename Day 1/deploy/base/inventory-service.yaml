apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: zero-trust-mesh
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: your-registry/inventory-service:latest
        imagePullPolicy: IfNotPresent
        env:
        # Increase this to > 0.0 to test Istio Circuit Breaking
        - name: FAILURE_RATE
          value: "0.0" 
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: zero-trust-mesh
spec:
  selector:
    app: inventory-service
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080